<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease & Aura — AI Capsule Wardrobe</title>
  <!-- Fallback redirect if JavaScript is disabled -->
  <meta http-equiv="refresh" content="0; url=/app.html" />
  <link rel="canonical" href="https://easeandaura.com/app.html" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #F8F4EF; }
    body {
      font-family: 'Jost', sans-serif;
      color: #3A3530;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      letter-spacing: 0.18em;
      margin-bottom: 1.25rem;
    }
    .logo em { color: #C9A96E; font-style: italic; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 1rem;
      border: 2px solid #E5DDD3; border-top-color: #C9A96E;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .note { font-size: 0.72rem; letter-spacing: 0.12em; color: #9A8878; line-height: 1.8; }
    a { color: #C9A96E; }
  </style>
</head>
<body>
  <div>
    <div class="logo">EASE <em>&amp;</em> AURA</div>
    <div class="spinner"></div>
    <p class="note">Taking you to your style quiz&hellip;<br />
      <a href="/app.html">Continue &rarr;</a> if you&rsquo;re not redirected.</p>
  </div>
  <script>
    // Instant client-side redirect (replace() keeps it out of history).
    window.location.replace('/app.html');
  </script>
</body>
</html>
